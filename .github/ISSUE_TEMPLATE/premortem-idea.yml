name: "Pre-Mortem 아이디어"
description: "2036년 AI×실패 시나리오 후보를 등록합니다 (KAIST 공모전)."
title: "[아이디어] "
labels: ["idea"]
body:
  - type: markdown
    attributes:
      value: |
        "2036년, 우리는 왜 실패했는가?" — 하나의 실패 장면을 제안하세요.
        작성 가이드: [premortem/competition-brief.md](../blob/main/premortem/competition-brief.md) · 후보 예시: [premortem/failure-candidates.md](../blob/main/premortem/failure-candidates.md)
  - type: input
    id: scene
    attributes:
      label: 한 줄 요약
      description: 실패 장면이 한 줄에 보이게. "AI 때문에 ○○" 금지.
      placeholder: "예: 2036년, 아무도 왜인지 모른 채 통과된 신약"
    validations:
      required: true
  - type: dropdown
    id: layer
    attributes:
      label: 탐색 층위
      description: 가이드북 3층위 중 (복수 선택 가능)
      multiple: true
      options:
        - "개인의 내면 (자아·의사결정·심리적 자율성)"
        - "관계와 연결 (유대감·소외·돌봄)"
        - "사회와 시스템 (법·제도·노동·공공신뢰)"
    validations:
      required: true
  - type: textarea
    id: failure
    attributes:
      label: 1. 예견된 실패 (2036)
      description: 누가 / 어떤 맥락 / 언제, 무엇이 무너졌는지 눈에 보이게. 한 장면에 집중.
    validations:
      required: true
  - type: textarea
    id: cause
    attributes:
      label: 2. 원인 진단 (2026 신호)
      description: 지금 이미 존재하는 신호·기술·제도·관행으로 역추적. 가능하면 출처/근거 링크.
    validations:
      required: true
  - type: textarea
    id: response
    attributes:
      label: 3. 대응 방안 (오늘~5년)
      description: 누가 / 무엇을 / 언제까지. "인식 전환" 같은 추상 금지.
    validations:
      required: true
  - type: textarea
    id: corpus
    attributes:
      label: 코퍼스 근거 (선택)
      description: 관련 레포 파일 경로나 외부 출처. 원인 진단의 신뢰도를 높입니다.
    validations:
      required: false
